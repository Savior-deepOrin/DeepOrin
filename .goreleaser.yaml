version: 2
project_name: deeporin

before:
  hooks:
    - go mod download

builds:
  - id: deeporin
    main: ./cmd/deeporin
    binary: deeporin
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: deeporin
    ids: [deeporin]
    name_template: "deeporin-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

homebrew_casks:
  - name: deeporin
    ids: [deeporin]
    # Prereleases (v*-rc*) must not update the stable tap; brew has no separate
    # prerelease channel, so a pushed rc cask becomes the default `brew install`.
    # npm is a separate line (release-npm.yml, `npm-v*`), so an npm prerelease no
    # longer drags brew along — a stable `v*` cask can ship while npm stays on rc.
    skip_upload: "auto"
    repository:
      owner: Savior-deepOrin
      name: homebrew-deeporin
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/Savior-deepOrin/deeporin"
    description: "Cache-first DeepSeek coding agent for the terminal."
    commit_author:
      name: deeporin
      email: deeporin@example.com
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/deeporin"]
          end

release:
  prerelease: auto
  name_template: "deepOrin CLI {{ .Tag }}"
